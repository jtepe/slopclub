name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bundle extension + skills
        run: |
          zip -r "slopclub-${GITHUB_REF_NAME}.zip" extension skills README.md LICENSE

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: slopclub-*.zip
