name: checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: ruff format
        run: uvx ruff format --check .
      - name: ruff lint
        run: uvx ruff check .
      - name: ty type check
        run: |
          for script in skills/pdf-reader/pdfread.py; do
            uv sync --script "$script"
            uvx ty check --python "$(uv python find --script "$script")" "$script"
          done
