<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="slopclub logo">
  <title>slopclub</title>
  <defs>
    <linearGradient id="goo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a3e635"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <g fill="url(#goo)">
    <!-- club lobes -->
    <circle cx="64" cy="38" r="21"/>
    <circle cx="41" cy="66" r="21"/>
    <circle cx="87" cy="66" r="21"/>
    <!-- stem, melting into the puddle -->
    <path d="M64 58 C 62 82 55 98 45 108 L 83 108 C 73 98 66 82 64 58 Z"/>
    <!-- drip from left lobe -->
    <path d="M33 76 C 33 88 34.5 94 34.5 99 A 4.2 4.6 0 0 0 42.9 99 C 42.9 92 42 86 42 76 Z"/>
    <!-- drip from right lobe -->
    <path d="M85 76 C 85 84 85.5 88 85.5 91 A 3.6 4 0 0 0 92.7 91 C 92.7 86 92 82 92 76 Z"/>
    <!-- falling droplet -->
    <ellipse cx="100" cy="101" rx="3" ry="4"/>
    <!-- puddle -->
    <path d="M28 114 C 28 109 40 106 64 106 C 88 106 100 109 100 114 C 100 119 88 121 64 121 C 40 121 28 119 28 114 Z"/>
  </g>
  <!-- glossy highlights -->
  <g fill="#ffffff" opacity="0.35">
    <ellipse cx="57" cy="31" rx="6.5" ry="4" transform="rotate(-25 57 31)"/>
    <circle cx="81" cy="59" r="3"/>
    <circle cx="36" cy="59" r="2.5"/>
    <ellipse cx="48" cy="113" rx="8" ry="1.8"/>
  </g>
</svg>
